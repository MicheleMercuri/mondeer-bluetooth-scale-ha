        show_weather_temperature: false
        show_weather_background: true
        entity: person.user1
        show_watch_battery: true
        connection_sensor: sensor.YOUR_PHONE_wifi_connection
        zone_2: zone.ite_v_de_fazio
        travel_sensor_2: sensor.user1_to_home
        watch_battery_sensor: sensor.YOUR_WATCH_battery_level
        battery_state_sensor: sensor.YOUR_WATCH_battery_state
        distance_sensor_2: sensor.user1_tracking_user1_distance
