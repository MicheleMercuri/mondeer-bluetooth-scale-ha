            \  padding: 18px 24px 14px 24px;\n  position: relative;\n  overflow: hidden;\n}\nha-card .header,\nha-card .container\
            \ {\n  padding: 0 !important;\n  margin: 0 !important;\n}\nha-card .title {\n  margin: 0 !important;\n  padding:\
            \ 0 !important;\n  font-size: 28px !important;\n  font-weight: 700 !important;\n  line-height: 1.1 !important;\n\
            \  display: inline-flex !important;\n  align-items: center !important;\n  gap: 10px !important;\n  width: max-content;\n\
            \  background: linear-gradient(90deg, #00d4ff, #ff80ab, #b388ff, #00d4ff);\n  background-size: 300% auto;\n  background-position:\
