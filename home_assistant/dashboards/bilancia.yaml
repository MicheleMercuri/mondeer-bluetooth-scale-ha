        - value: home
          name: 🏡 Casa
          styles:
            name:
              color: '#7DDA9F'
          entity_picture: /local/profile_pic/mm_home.png
        - value: not_home
          name: 🚶‍♂️ Fuori Casa
          styles:
            name:
              color: '#93ADCB'
          entity_picture: /local/profile_pic/mm_not_home.png
        - value: Lavoro
