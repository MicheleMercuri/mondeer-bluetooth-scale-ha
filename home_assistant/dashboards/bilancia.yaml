            \ linear infinite;\n  pointer-events: none;\n}\nha-card .title::before {\n  content: \"⚖️\";\n  font-size: 26px;\n\
            \  line-height: 1;\n  -webkit-text-fill-color: initial;\n  background: none !important;\n  filter: drop-shadow(0\
            \ 0 5px rgba(100, 200, 255, 0.55));\n}\nha-card .subtitle { display: none !important; }\nha-card::after {\n  content:\
            \ \"\";\n  display: block;\n  width: 100%;\n  height: 4px;\n  margin-top: 12px;\n  border-radius: 999px;\n  background-image:\n\
            \    linear-gradient(90deg, rgba(0,212,255,0.20), rgba(255,128,171,0.20), rgba(179,136,255,0.20)),\n    linear-gradient(90deg,\n\
            \      transparent 0%,\n      rgba(0,212,255,0.00) 18%,\n      rgba(0,212,255,0.70) 35%,\n      rgba(255,128,171,0.85)\
            \ 47%,\n      rgba(255,255,255,1.00) 50%,\n      rgba(179,136,255,0.85) 53%,\n      rgba(0,212,255,0.70) 65%,\n\
            \      rgba(0,212,255,0.00) 82%,\n      transparent 100%),\n    radial-gradient(circle,\n      rgba(255,255,255,1.00)\
            \ 0%,\n      rgba(255,255,255,0.55) 35%,\n      rgba(255,128,171,0.22) 58%,\n      transparent 75%);\n  background-size:\
            \ 100% 100%, 200% 100%, 18px 18px;\n  background-repeat: no-repeat;\n  background-position: 0% 0, 110% 0, -12px\
