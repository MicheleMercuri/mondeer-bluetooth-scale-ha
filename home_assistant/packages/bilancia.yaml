  bilancia_user2_eta:
    name: "Età User2"
    min: 0
    max: 120
    step: 1
    initial: 51
    unit_of_measurement: anni
    icon: mdi:cake-variant
    mode: box
  bilancia_user2_altezza:
    name: "Altezza User2"
    min: 100
    max: 220
    step: 1
    initial: 169
    unit_of_measurement: cm
    icon: mdi:human-female-height
    mode: box
  bilancia_user2_peso_min:
