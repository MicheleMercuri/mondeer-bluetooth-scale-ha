# ============================================================
# Sensori MQTT (sostituiscono il REST API push, persistenti)
# Il listener Python pubblica su bilancia_mondeer/peso_<nome>/state
# ============================================================

mqtt:
  sensor:
    - name: "Peso Michele"
      unique_id: bilancia_peso_michele_v2
      state_topic: "bilancia_mondeer/peso_michele/state"
      value_template: "{{ value_json.weight_kg }}"
      json_attributes_topic: "bilancia_mondeer/peso_michele/state"
      unit_of_measurement: "kg"
      device_class: weight
      state_class: measurement
      icon: mdi:scale-bathroom

    - name: "Peso Maria Luisa"
      unique_id: bilancia_peso_maria_luisa_v2
      state_topic: "bilancia_mondeer/peso_maria_luisa/state"
      value_template: "{{ value_json.weight_kg }}"
      json_attributes_topic: "bilancia_mondeer/peso_maria_luisa/state"
      unit_of_measurement: "kg"
      device_class: weight
      state_class: measurement
      icon: mdi:scale-bathroom

    - name: "Peso Matilde"
      unique_id: bilancia_peso_matilde_v2
      state_topic: "bilancia_mondeer/peso_matilde/state"
      value_template: "{{ value_json.weight_kg }}"
      json_attributes_topic: "bilancia_mondeer/peso_matilde/state"
      unit_of_measurement: "kg"
      device_class: weight
      state_class: measurement
      icon: mdi:scale-bathroom

    # Debug: ultime 80 righe del log del listener, retained su MQTT.
    - name: "Bilancia listener log"
      unique_id: bilancia_listener_log
      state_topic: "bilancia_mondeer/listener/recent_log"
      value_template: "{{ value_json.ts }}"
      json_attributes_topic: "bilancia_mondeer/listener/recent_log"
      icon: mdi:console-line

    # Debug: ultimi 20 errori (WARNING+ERROR con stack trace).
    - name: "Bilancia listener errors"
      unique_id: bilancia_listener_errors
      state_topic: "bilancia_mondeer/listener/errors"
      value_template: "{{ value_json.n }}"
      json_attributes_topic: "bilancia_mondeer/listener/errors"
      icon: mdi:alert-circle-outline
      unit_of_measurement: "errors"

    # Status snapshot del listener (pubblicato ogni 30s):
    # phase, ultima pesata, success rate, scale advertising, rssi, ...
    - name: "Bilancia listener status"
      unique_id: bilancia_listener_status
      state_topic: "bilancia_mondeer/listener/status"
      value_template: "{{ value_json.phase }}"
      json_attributes_topic: "bilancia_mondeer/listener/status"
      icon: mdi:heart-pulse

# ============================================================
# Notifica Telegram a ogni nuova pesata
# ============================================================
automation:
  - alias: "Bilancia · Notifica pesata"
    id: bilancia_notifica_pesata
    mode: parallel
    # Trigger su measured_at; condition is_complete=true filtra fuori i
    # record preliminari (peso senza BIA) e i merge che riusano il vecchio
    # body comp. Garantisce 1 sola notifica per pesata, con BIA fresca.
    trigger:
      - platform: state
        entity_id:
          - sensor.peso_michele
          - sensor.peso_maria_luisa
          - sensor.peso_matilde
        attribute: measured_at
    condition:
      - "{{ trigger.to_state.state not in ['unknown','unavailable'] }}"
      - "{{ trigger.to_state.attributes.is_complete is true }}"
    action:
      - variables:
          slug: "{{ trigger.entity_id.split('.peso_')[1] }}"
          name: "{{ slug.replace('_', ' ').title() }}"
          icon_emoji: >-
            {% if slug == 'michele' %}👨{% elif slug == 'maria_luisa' %}👩{% else %}👧{% endif %}
          peso: "{{ trigger.to_state.state }}"
          delta: "{{ states('sensor.peso_' + slug + '_scostamento_mensile') }}"
          bmi: "{{ states('sensor.peso_' + slug + '_bmi') }}"
          bmi_st: "{{ states('sensor.peso_' + slug + '_bmi_stato') }}"
          gr: "{{ states('sensor.peso_' + slug + '_grasso') }}"
          gr_st: "{{ states('sensor.peso_' + slug + '_grasso_stato') }}"
          gr_min: "{{ state_attr('sensor.peso_' + slug + '_grasso_stato', 'range_min') }}"
          gr_max: "{{ state_attr('sensor.peso_' + slug + '_grasso_stato', 'range_max') }}"
          ac: "{{ states('sensor.peso_' + slug + '_acqua') }}"
          ac_st: "{{ states('sensor.peso_' + slug + '_acqua_stato') }}"
          os: "{{ states('sensor.peso_' + slug + '_ossa') }}"
          os_st: "{{ states('sensor.peso_' + slug + '_ossa_stato') }}"
          mu: "{{ states('sensor.peso_' + slug + '_muscoli') }}"
          mu_st: "{{ states('sensor.peso_' + slug + '_muscoli_stato') }}"
          vi: "{{ states('sensor.peso_' + slug + '_viscerale') }}"
          vi_st: "{{ states('sensor.peso_' + slug + '_viscerale_stato') }}"
          bmr: "{{ states('sensor.peso_' + slug + '_calorie_bmr') }}"
          measured: "{{ trigger.to_state.attributes.measured_at }}"
      - service: telegram_bot.send_message
        data:
          chat_id: !secret bilancia_telegram_chat_id
          parse_mode: markdown
          message: |-
            {% macro icon(s) -%}
            {%- if s == 'ottimale' -%}✅
            {%- elif s == 'sotto' -%}🔵
            {%- elif s == 'sopra' -%}⚠️
            {%- else -%}—
            {%- endif -%}
            {%- endmacro -%}
            ⚖️ *Nuova pesata — {{ name }}* {{ icon_emoji }}
            *{{ peso }} kg*{% if delta not in ['unknown','unavailable'] %} ({% set v = delta|float(0) %}{% if v > 0 %}▲ +{{ v }}%{% elif v < 0 %}▼ {{ v }}%{% else %}● invariato{% endif %} vs mese scorso){% endif %}

            📊 *Composizione corporea*
            • IMC: *{{ bmi }}* {{ icon(bmi_st) }}
            • Massa grassa: {{ gr }}% {{ icon(gr_st) }}{% if gr_min and gr_max %} _(range {{ gr_min }}–{{ gr_max }}%)_{% endif %}
            • Acqua corporea: {{ ac }}% {{ icon(ac_st) }}
            • Massa ossea: {{ os }} kg {{ icon(os_st) }}
            • Massa muscolare: {{ mu }} kg {{ icon(mu_st) }}
            • Grasso viscerale: {{ vi }} {{ icon(vi_st) }}
            • Metabolismo basale: {{ bmr }} kcal

            🕐 {{ as_timestamp(measured) | timestamp_custom('%d/%m %H:%M', true) }}

  # ----------------------------------------------------------
  # Riconoscimento utente: il listener pubblica una "domanda"
  # quando non è certo (bootstrap o ambiguità). Mandiamo una
  # inline keyboard Telegram. La risposta torna su MQTT al
  # listener che salva il sample e finalizza il push.
  # ----------------------------------------------------------
  - alias: "Bilancia · Inquiry da listener (chiedi chi si è pesato)"
    id: bilancia_inquiry_ask
    mode: parallel
    trigger:
      - platform: mqtt
        topic: "bilancia_mondeer/inquiry/+/state"
    action:
      - variables:
          inquiry_id: "{{ trigger.topic.split('/')[2] }}"
          payload: "{{ trigger.payload_json }}"
          predicted: "{{ payload.predicted | default('?') }}"
          conf_pct: "{{ ((payload.confidence | float(0)) * 100) | round(0) }}"
          peso: "{{ payload.weight_kg | default('?') }}"
          imc: "{{ payload.bmi | default('?') }}"
          fat: "{{ payload.fat_pct | default('?') }}"
          water: "{{ payload.water_pct | default('?') }}"
          muscle: "{{ payload.muscle_kg | default('?') }}"
          bone: "{{ payload.bone_kg | default('?') }}"
          visc: "{{ payload.visceral_fat | default('?') }}"
      - service: telegram_bot.send_message
        data:
          chat_id: !secret bilancia_telegram_chat_id
          parse_mode: markdown
          message: |-
            🤔 *Chi si è pesato?*

            *Peso:* {{ peso }} kg · *IMC:* {{ imc }}
            *Grasso:* {{ fat }}% · *Acqua:* {{ water }}%
            *Muscoli:* {{ muscle }} kg · *Ossa:* {{ bone }} kg · *Visc.:* {{ visc }}

            _Suggerito:_ {{ predicted }} ({{ conf_pct }}% conf.)
          # Nested list explicit: ogni riga (-) è una lista di [label, data].
          # La sintassi a stringa "label:data,label:data" non funziona qui
          # perché i nostri callback_data contengono ":" interni
          # (formato "bw:<inquiry_id>:<slug>") e il parser HA si confonde.
          inline_keyboard:
            - - ["👨 Michele", "bw:{{ inquiry_id }}:michele"]
              - ["👩 Maria Luisa", "bw:{{ inquiry_id }}:maria_luisa"]
              - ["👧 Matilde", "bw:{{ inquiry_id }}:matilde"]

  - alias: "Bilancia · Risposta callback Telegram → MQTT answer"
    id: bilancia_inquiry_answer
    mode: parallel
    trigger:
      - platform: event
        event_type: telegram_callback
    condition:
      - "{{ trigger.event.data.data is defined }}"
      - "{{ trigger.event.data.data.startswith('bw:') }}"
    action:
      - variables:
          parts: "{{ trigger.event.data.data.split(':') }}"
          inquiry_id: "{{ parts[1] }}"
          user_slug: "{{ parts[2] }}"
          user_label: >-
            {%- if user_slug == 'michele' -%}Michele
            {%- elif user_slug == 'maria_luisa' -%}Maria Luisa
            {%- elif user_slug == 'matilde' -%}Matilde
            {%- else -%}{{ user_slug }}
            {%- endif -%}
      # Ack del bottone (toglie lo spinner su Telegram)
      - service: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "Pesata salvata come {{ user_label }} ✅"
      # Riscriviamo il messaggio originale così l'utente vede la scelta confermata
      - service: telegram_bot.edit_message
        data:
          message_id: "{{ trigger.event.data.message.message_id }}"
          chat_id: "{{ trigger.event.data.chat_id }}"
          parse_mode: markdown
          message: |-
            ✅ *Pesata salvata come {{ user_label }}*
            (inquiry {{ inquiry_id }})
      # Diciamo al listener (sul minipc) chi attribuire la pesata.
      - service: mqtt.publish
        data:
          topic: "bilancia_mondeer/inquiry/{{ inquiry_id }}/answer"
          payload: '{"name": "{{ user_slug }}"}'
          qos: 1
          retain: false

  # ----------------------------------------------------------
  # Push notifica all'app WeighAi (Android) alla pesata completa.
  # Con tag fisso (weighai_pesata) la nuova notifica sostituisce
  # la precedente, quindi non si accumulano. Il clickAction usa il
  # deep link weighai://main: l'app intercetta l'intent, fa refresh
  # MQTT e mostra subito il dato fresco.
  # ----------------------------------------------------------
  - alias: "Bilancia · Push app WeighAi su pesata"
    id: bilancia_push_app_weighai
    mode: parallel
    trigger:
      - platform: state
        entity_id:
          - sensor.peso_michele
        attribute: measured_at
    condition:
      - "{{ trigger.to_state.state not in ['unknown','unavailable'] }}"
      - "{{ trigger.to_state.attributes.is_complete is true }}"
    action:
      - service: notify.mobile_app_YOUR_DEVICE  # replace with your phone, see HA → Settings → Devices
        data:
          title: "⚖️ Pesata pronta"
          message: "{{ trigger.to_state.state }} kg — apri per i dettagli"
          data:
            tag: "weighai_pesata"
            channel: "WeighAi"
            importance: high
            clickAction: "weighai://main"

  # ----------------------------------------------------------
  # Weekly digest AI — domenica 21:00 manda via Telegram un
  # riassunto delle pesate dei 7 giorni precedenti, generato
  # da Gemini 3.1 Flash Lite Preview.
  # ----------------------------------------------------------
  - alias: "Bilancia · Weekly digest AI (domenica 21:00)"
    id: bilancia_weekly_digest
    mode: single
    trigger:
      - platform: time
        at: "21:00:00"
    condition:
      - condition: time
        weekday:
          - sun
    action:
      # 1) Aggrego le ultime 7 giornate di pesate dai 3 sensor.
      #    history_stats e get_history non sono direttamente templatabili,
      #    quindi prendiamo le statistiche correnti + la posizione 7d fa
      #    + ricostruiamo dai sensori derivati che teniamo già in HA.
      - variables:
          weekly_data: >-
            {%- set users = ['michele', 'maria_luisa', 'matilde'] -%}
            {%- set out = {} -%}
            {%- for u in users -%}
              {%- set s = states('sensor.peso_' + u) -%}
              {%- set fat = state_attr('sensor.peso_' + u, 'fat_percent') -%}
              {%- set water = state_attr('sensor.peso_' + u, 'water_percent') -%}
              {%- set bone = state_attr('sensor.peso_' + u, 'bone_kg') -%}
              {%- set muscle = state_attr('sensor.peso_' + u, 'muscle_kg') -%}
              {%- set bmi = state_attr('sensor.peso_' + u, 'bmi') -%}
              {%- set visc = state_attr('sensor.peso_' + u, 'visceral_fat') -%}
              {%- set delta = states('sensor.peso_' + u + '_scostamento') -%}
              {%- set last_at = state_attr('sensor.peso_' + u, 'measured_at') -%}
              {{- out.update({u: {
                'weight_kg': s, 'fat': fat, 'water': water,
                'bone': bone, 'muscle': muscle, 'bmi': bmi,
                'visceral': visc, 'monthly_delta_pct': delta,
                'last_at': last_at
              }}) or '' -}}
            {%- endfor -%}
            {{ out | tojson }}
          gemini_prompt: >-
            Sei un nutrizionista esperto. Analizza i dati delle ultime pesate
            di una famiglia di 3 persone (Michele, uomo 52 anni 172 cm; Maria
            Luisa, donna 51 anni 169 cm; Matilde, ragazza 14 anni 155 cm).

            Dati ultima pesata di ciascuno (JSON):
            {{ weekly_data }}

            Compito: produci un report markdown breve (max 150 parole totali)
            in italiano, con UNA sezione per persona (titolo "*Nome*"). Per
            ognuna:
            - 1 frase sullo stato corrente (peso, BMI, composizione)
            - 1 frase con osservazione utile o tendenza (se monthly_delta_pct
              non e' null usalo, altrimenti commenta solo la composizione)
            - se un dato e' mancante (None/null) NON inventare numeri, scrivi
              "dati incompleti".

            Tono cordiale ma asciutto, niente emoji nel corpo del testo
            (li mette l'app HA dopo). NON includere disclaimer medici.
      # 2) Chiamo Gemini via il servizio ai_task.generate_data (sostituisce
      #    google_generative_ai_conversation.generate_content che è deprecato
      #    e verrà rimosso in HA 2026.4.0).
      - service: ai_task.generate_data
        data:
          task_name: "Bilancia weekly digest"
          entity_id: ai_task.google_ai_task
          instructions: "{{ gemini_prompt }}"
        response_variable: ai_response
      # 3) Estraggo il testo (il servizio ritorna {conversation_id, data}).
      - variables:
          report_md: >-
            {{ ai_response.data
               if ai_response is defined and ai_response.data is defined
               else '⚠️ AI Task non ha risposto.' }}
      # 4) Mando via Telegram con header e footer.
      - service: telegram_bot.send_message
        data:
          chat_id: !secret bilancia_telegram_chat_id
          parse_mode: markdown
          message: |-
            📊 *Report settimanale Bilancia*
            _{{ (now() - timedelta(days=7)).strftime('%d/%m') }} – {{ now().strftime('%d/%m/%Y') }}_

            {{ report_md }}

            🤖 _Generato da Gemini 2.5 Flash_

template:

  # ============================================================
  # Macro condivise per valutare range
  # ============================================================
  # Le macro sono definite "inline" in ciascun sensor di stato.

  - sensor:
      # ------------------------------------------------------------
      # MICHELE — uomo 52 anni, 172 cm, range peso 61-69 kg
      # ------------------------------------------------------------

      - name: "Peso Michele IMC"
        unique_id: peso_michele_bmi
        unit_of_measurement: ""
        state_class: measurement
        icon: mdi:human-male
        availability: "{{ state_attr('sensor.peso_michele', 'bmi') is not none }}"
        state: "{{ state_attr('sensor.peso_michele', 'bmi') | float(0) | round(1) }}"

      - name: "Peso Michele IMC stato"
        unique_id: peso_michele_bmi_stato
        availability: "{{ states('sensor.peso_michele_bmi') not in ['unknown','unavailable'] }}"
        state: >
          {% set v = states('sensor.peso_michele_bmi') | float(0) %}
          {% if v < 18.5 %}sotto
          {% elif v <= 24.9 %}ottimale
          {% else %}sopra
          {% endif %}
        attributes:
          range_min: 18.5
          range_max: 24.9

      - name: "Peso Michele Massa grassa"
        unique_id: peso_michele_grasso
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:water-percent
        availability: "{{ state_attr('sensor.peso_michele', 'fat_percent') is not none }}"
        state: "{{ state_attr('sensor.peso_michele', 'fat_percent') | float(0) | round(1) }}"

      - name: "Peso Michele Massa grassa stato"
        unique_id: peso_michele_grasso_stato
        availability: "{{ states('sensor.peso_michele_grasso') not in ['unknown','unavailable'] }}"
        state: >
          {% set v = states('sensor.peso_michele_grasso') | float(0) %}
          {% if v < 14 %}sotto
          {% elif v <= 24 %}ottimale
          {% else %}sopra
          {% endif %}
        attributes:
          range_min: 14
          range_max: 24

      - name: "Peso Michele Acqua corporea"
        unique_id: peso_michele_acqua
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:water
        availability: "{{ state_attr('sensor.peso_michele', 'water_percent') is not none }}"
        state: "{{ state_attr('sensor.peso_michele', 'water_percent') | float(0) | round(1) }}"

      - name: "Peso Michele Acqua corporea stato"
        unique_id: peso_michele_acqua_stato
        availability: "{{ states('sensor.peso_michele_acqua') not in ['unknown','unavailable'] }}"
        state: >
          {% set v = states('sensor.peso_michele_acqua') | float(0) %}
          {% if v < 50 %}sotto
          {% elif v <= 65 %}ottimale
          {% else %}sopra
          {% endif %}
        attributes:
          range_min: 50
          range_max: 65

      - name: "Peso Michele Massa ossea"
        unique_id: peso_michele_ossa
        unit_of_measurement: "kg"
        state_class: measurement
        icon: mdi:bone
        availability: "{{ state_attr('sensor.peso_michele', 'bone_kg') is not none }}"
        state: "{{ state_attr('sensor.peso_michele', 'bone_kg') | float(0) | round(2) }}"

      - name: "Peso Michele Massa ossea stato"
        unique_id: peso_michele_ossa_stato
        availability: "{{ states('sensor.peso_michele_ossa') not in ['unknown','unavailable'] }}"
        state: >
          {% set v = states('sensor.peso_michele_ossa') | float(0) %}
          {% if v < 2.9 %}sotto
          {% elif v <= 3.6 %}ottimale
          {% else %}sopra
          {% endif %}
        attributes:
          range_min: 2.9
          range_max: 3.6

      - name: "Peso Michele Massa muscolare"
        unique_id: peso_michele_muscoli
        unit_of_measurement: "kg"
        state_class: measurement
        icon: mdi:arm-flex
        availability: "{{ state_attr('sensor.peso_michele', 'muscle_kg') is not none }}"
