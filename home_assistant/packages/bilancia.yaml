# Bilancia Mondeer / WanKa C1 — template sensors + valutazione range ottimali
#
# Il listener Python (mipc Windows) pusha i pesi via REST API in:
#   sensor.peso_user1
#   sensor.peso_user2
#   sensor.peso_user3
#
# State = peso kg, attributi = bmi/fat/water/bone/muscle/visceral/calorie/...
#
# Questo package estrae ogni metrica come sensore separato (con history)
# e calcola lo "stato salute" per ciascuna (sotto/ottimale/sopra) usando
# range diversi per sesso/età.
#
# Fonti range:
#   - BMI: OMS/WHO standard adulti, percentili IOTF per adolescenti
#   - Grasso %: ACSM/AHA 2024
#   - Acqua %: USGS, Yale Medicine
#   - Ossa kg: scala Tanita/CE-Link OEM
#   - Muscoli kg: % di massa magra ACSM
#   - Grasso viscerale: rating Tanita 1-59 (1-12 sano)

# ============================================================
# Helpers profili famiglia (editabili da dashboard)
# Il listener Python li legge ad ogni connect e li manda alla bilancia.
# ============================================================
input_select:
  bilancia_user1_sesso:
    name: "Sesso User1"
    options: [M, F]
    initial: M
    icon: mdi:gender-male-female
  bilancia_user2_sesso:
    name: "Sesso User2"
    options: [M, F]
    initial: F
    icon: mdi:gender-male-female
  bilancia_user3_sesso:
    name: "Sesso User3"
    options: [M, F]
    initial: F
    icon: mdi:gender-male-female

input_number:
