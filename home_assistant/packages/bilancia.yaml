          {% set v = states('sensor.peso_user1_grasso') | float(0) %}
          {% if v < 14 %}sotto
          {% elif v <= 24 %}ottimale
          {% else %}sopra
          {% endif %}
        attributes:
          range_min: 14
          range_max: 24

      - name: "Peso User1 Acqua corporea"
