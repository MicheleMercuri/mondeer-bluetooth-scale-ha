    min: 30
    max: 200
    step: 0.5
    initial: 69
    unit_of_measurement: kg
    icon: mdi:arrow-up-bold
    mode: box
  bilancia_maria_luisa_eta:
    name: "Età Maria Luisa"
    min: 0
    max: 120
    step: 1
    initial: 51
    unit_of_measurement: anni
    icon: mdi:cake-variant
    mode: box
  bilancia_maria_luisa_altezza:
    name: "Altezza Maria Luisa"
    min: 100
    max: 220
    step: 1
    initial: 169
    unit_of_measurement: cm
    icon: mdi:human-female-height
    mode: box
  bilancia_maria_luisa_peso_min:
